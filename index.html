<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #1e1e1e;

    select, input, button, textarea {

    }

    button {
      background: #28a745;
      color: white;
      font-weight: bold;
      border: none;
    }

    .resultado {
      margin-top: 10px;
      font-weight: bold;
    }

    .instagram {
      display: block;
      text-align: center;
      background: #E1306C;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 10px;
      font-weight: bold;
    }

    .whatsapp {
      display: block;
      text-align: center;
      background: #25D366;
      color: white;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 10px;
      font-weight: bold;
    }

    .whatsapp-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      border-radius: 50%;
      text-align: center;

      color: white;

      text-decoration: none;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.3);

    footer {

      font-size: 12px;

    }

    @media (min-width: 600px) {

      }

</head>

<body>

<header>
  <h2>CJSM PINTURAS</h2>
  <p>Pintor profissional em Pompéu - MG</p>
</header>

<div class="container">

  <div class="card">
    <h3>Solicite seu orçamento</h3>

    <select id="servico">
      <option value="12">Pintura interna</option>
      <option value="15">Pintura externa</option>
      <option value="18">Textura</option>
      <option value="20">Grafiato</option>
      <option value="25">Impermeabilização</option>
    </select>

    <input type="number" id="metragem" placeholder="Digite a metragem (m²)">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <div class="card">

  © 2026 CJSM Pinturas - Pompéu MG
</footer>

<!-- Botão flutuante -->
<a href="https://wa.me/5537999591572" class="whatsapp-float" target="_blank">
  💬
</a>

<script>
function calcular() {
  let valor = document.getElementById("servico").value;
  let metragem = document.getElementById("metragem").value;

  if(metragem === "") {
    alert("Digite a metragem!");
    return;
  }

  let total = valor * metragem;

  document.getElementById("resultado").innerHTML =
    "Valor estimado: R$ " + total.toFixed(2);
}
</script>
